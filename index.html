<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<!-- LOGIN FORM -->
<div class="container loginForm">
    <h1>Login page</h1>

    <form id="loginForm">
        <input id="loginUsername" type="text" placeholder="Username">
        <div class="password-container">
            <input id="loginPassword" type="password" placeholder="Password">
            <span class="eye-icon" onclick="togglePassword('loginPassword')">👁️</span>
        </div>

        <div class="forgot-password">
            <a href="#">Forgot Password?</a>
        </div>

        <button id="login" type="button">Login</button>
        <p class="message" id="loginMessage"></p>

        <p>
            Don't have an account?
            <a href="#" onclick="showSignup(); return false;">Signup</a>
        </p>
    </form>
</div>

<!-- SIGNUP FORM -->
<div class="container signupForm" style="display:none;">
    <h1>Signup Form</h1>

    <form id="signupForm">
        <input id="signupFirstName" type="text" placeholder="First Name">
        <input id="signupLastName" type="text" placeholder="Last Name">
        <input id="signupUsername" type="text" placeholder="Username">
        <input id="signupEmail" type="email" placeholder="Email">
        <div class="password-container">
            <input id="signupPassword" type="password" placeholder="Password">
            <span class="eye-icon" onclick="togglePassword('signupPassword')">👁️</span>
        </div>

        <button id="create" type="button">Create Account</button>
        <p class="message" id="signupMessage"></p>

        <p>
            Already have an account?
            <a href="#" onclick="showLogin(); return false;">Login</a>
        </p>
    </form>
</div>

<!-- STUDENT DATA -->
<div class="container studentData" style="display:none;">
    <h1 id="welcomeTitle">Student Data</h1>

    <form id="studentForm">
        <input id="studentName" type="text" placeholder="Student Name">
        <input id="studentId" type="text" placeholder="Student ID">
        <input id="studentCourse" type="text" placeholder="Course">
        <input id="studentYear" type="text" placeholder="Year">

        <button id="submitData" type="button">Submit Data</button>
        <p class="message" id="studentMessage"></p>
    </form>

    <p>
        Back to
        <a href="#" onclick="logout(); return false;">Login</a>
    </p>
</div>

</body>
</html>
